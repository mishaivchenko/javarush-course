<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don't Touch</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="icon">🚫</span>
            <h1>Don't Touch</h1>
        </div>

        <div class="status-bar">
            <span id="statusIndicator" class="status-dot active"></span>
            <span id="statusText">Active on this page</span>
        </div>

        <div class="controls">
            <label class="slider-label">
                <span>Sensitivity</span>
                <span id="sensitivityValue">60%</span>
            </label>
            <input type="range" id="sensitivitySlider" min="0" max="100" value="60">

            <div class="toggle-row">
                <label for="blockImages">Block Images</label>
                <label class="switch">
                    <input type="checkbox" id="blockImages" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="toggle-row">
                <label for="blockVideos">Block Videos</label>
                <label class="switch">
                    <input type="checkbox" id="blockVideos" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="toggle-row">
                <label for="blockText">Block Text</label>
                <label class="switch">
                    <input type="checkbox" id="blockText" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <button id="toggleExtension" class="toggle-btn">Pause on This Page</button>
        </div>

        <div class="stats">
            <div class="stat">
                <span class="stat-value" id="itemsBlocked">0</span>
                <span class="stat-label">Blocked</span>
                <span class="blocked-label">on this page</span>
            </div>
        </div>

        <div class="footer">
            <span>100% on-device • Zero data leaves your device</span>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
