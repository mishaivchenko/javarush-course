name: DontTouch
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
settings:
  SWIFT_VERSION: "5.9"

targets:
  DontTouch:
    type: application
    platform: macOS
    sources:
      - path: DontTouch
        type: group
      - path: DontTouch Detection
        type: group
        createIntermediateGroups: true
        excludes:
          - "Info.plist"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.yourname.donttouch
      INFOPLIST_FILE: DontTouch/Info.plist
      CODE_SIGN_ENTITLEMENTS: DontTouch/DontTouch.entitlements
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
    info:
      path: DontTouch/Info.plist
      properties:
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
        NSPhotoLibraryUsageDescription: Don't Touch needs camera access to analyze images on-device
    dependencies:
      - target: DontTouch Extension
        embed: true
        codeSign: true

  DontTouch Extension:
    type: app-extension
    platform: macOS
    sources:
      - path: DontTouch Extension
        type: group
      - path: DontTouch Detection
        type: group
        createIntermediateGroups: true
        excludes:
          - "Info.plist"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.yourname.donttouch.extension
      INFOPLIST_FILE: DontTouch Extension/Info.plist
      CODE_SIGN_ENTITLEMENTS: DontTouch Extension/DontTouch_Extension.entitlements
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
    info:
      path: DontTouch Extension/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.Safari-web-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SafariWebExtensionHandler
          SFSafariContentScript: true
          NSExtensionAttributes:
            SFSafariWebsiteAccess:
              Level: All
        SFSafariExtensionBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        NSPhotoLibraryUsageDescription: Don't Touch needs camera access to analyze images on-device
        LSMinimumSystemVersion: "14.0"
