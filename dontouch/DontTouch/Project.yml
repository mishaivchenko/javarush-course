name: DontTouch
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
settings:
  SWIFT_VERSION: "5.9"

targets:
  DontTouch:
    type: application
    platform: macOS
    sources:
      - path: DontTouch
        type: group
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.yourname.donttouch
      INFOPLIST_FILE: DontTouch/Info.plist
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
    info:
      path: DontTouch/Info.plist
      properties:
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
        NSPhotoLibraryUsageDescription: Don't Touch needs camera access to analyze images on-device
    dependencies:
      - target: DontTouch Extension
        embed: true
        codeSign: true
      - target: DontTouch Detection

  DontTouch Extension:
    type: app-extension
    platform: macOS
    sources:
      - path: DontTouch Extension
        type: group
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.yourname.donttouch.extension
      INFOPLIST_FILE: DontTouch Extension/Info.plist
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - target: DontTouch Detection
    info:
      path: DontTouch Extension/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.Safari-web-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SafariWebExtensionHandler
          SFSafariContentScript: true
          NSExtensionAttributes:
            SFSafariWebsiteAccess:
              Level: All
        SFSafariExtensionBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        NSPhotoLibraryUsageDescription: Don't Touch needs camera access to analyze images on-device
        LSMinimumSystemVersion: "14.0"

  DontTouch Detection:
    type: framework
    platform: macOS
    sources:
      - path: DontTouch Detection
        type: group
    resources:
      - path: DontTouch Detection/blocklist.txt
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.yourname.donttouch.detection
      INFOPLIST_FILE: DontTouch Detection/Info.plist
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - sdk: AVFoundation.framework
    info:
      path: DontTouch Detection/Info.plist
      properties:
        LSMinimumSystemVersion: "14.0"
