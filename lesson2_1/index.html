<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>100 DEAD MEN — Prisoner Simulation</title>
  <style>
    /* ============================================================
       CSS THEME — Dark Pixel-Prison (Bloodborne-Inspired)
       ============================================================ */
    :root {
      --bg: #0a0a0a;
      --panel: #1a1a1a;
      --stone: #2c2c2c;
      --stone-light: #4a4a4a;
      --text: #c8c8c8;
      --text-dim: #666666;
      --accent: #8b0000;
      --accent-bright: #cc0000;
      --found: #2a5a2a;
      --found-text: #6aaa6a;
      --fail: #3a1a1a;
      --fail-bright: #6a1a1a;
      --border-px: 3px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
    }

    /* ===== MAIN CONTAINER ===== */
    #app {
      max-width: 960px;
      width: 100%;
    }

    /* ===== HEADER ===== */
    .header {
      text-align: center;
      padding: 30px 0 20px 0;
      border-bottom: var(--border-px) double var(--stone);
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.8em;
      font-weight: bold;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #8b0000;
      text-shadow:
        0 0 10px rgba(139, 0, 0, 0.6),
        0 0 20px rgba(139, 0, 0, 0.4),
        0 0 40px rgba(139, 0, 0, 0.2);
      animation: pulse-glow 3s ease-in-out infinite;
      font-family: 'Courier New', Courier, monospace;
    }

    @keyframes pulse-glow {
      0%, 100% { text-shadow: 0 0 10px rgba(139, 0, 0, 0.6), 0 0 20px rgba(139, 0, 0, 0.4), 0 0 40px rgba(139, 0, 0, 0.2); }
      50% { text-shadow: 0 0 15px rgba(139, 0, 0, 0.9), 0 0 30px rgba(139, 0, 0, 0.6), 0 0 60px rgba(139, 0, 0, 0.3); }
    }

    .header .subtitle {
      color: var(--text-dim);
      font-size: 0.8em;
      letter-spacing: 0.2em;
      margin-top: 8px;
      text-transform: uppercase;
    }

    /* ===== LAYOUT ROWS ===== */
    .controls-row {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .controls-row > .panel {
      flex: 1;
      min-width: 200px;
    }

    /* ===== PANELS ===== */
    .panel {
      background: var(--panel);
      border: var(--border-px) double var(--stone);
      padding: 16px;
      margin-bottom: 20px;
    }

    .panel h2 {
      font-size: 0.85em;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--stone);
      padding-bottom: 6px;
    }

    .panel h3 {
      font-size: 0.75em;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    /* ===== BOX GRID ===== */
    .grid-wrapper {
      position: relative;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 4px;
      background: var(--panel);
      border: var(--border-px) double var(--stone);
      padding: 8px;
    }

    .box {
      aspect-ratio: 1;
      background: var(--stone);
      border: 2px solid var(--stone-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7em;
      font-family: 'Courier New', Courier, monospace;
      color: var(--text-dim);
      cursor: default;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      position: relative;
      min-height: 28px;
    }

    .box.revealed {
      background: #1a1a2a;
      border-color: var(--stone-light);
      color: var(--text);
    }

    .box.in-path {
      background: var(--fail);
      border-color: #8b3333;
      color: #aa6666;
    }

    .box.current {
      background: #3a0000;
      border-color: var(--accent-bright);
      color: var(--accent-bright);
      box-shadow: inset 0 0 8px rgba(204, 0, 0, 0.3);
    }

    .box.found {
      background: var(--found);
      border-color: var(--found-text);
      color: var(--found-text);
      box-shadow: inset 0 0 8px rgba(106, 170, 106, 0.3);
    }

    .box.failed {
      background: #2a0000;
      border-color: var(--fail-bright);
      color: #aa3333;
    }

    /* ===== PRISONER PATH TEXT ===== */
    .path-display {
      background: var(--panel);
      border: var(--border-px) double var(--stone);
      padding: 10px 14px;
      margin-bottom: 20px;
      font-size: 0.85em;
      color: var(--text);
      min-height: 44px;
      line-height: 1.6;
      font-family: 'Courier New', Courier, monospace;
    }

    .path-display .found-text {
      color: var(--found-text);
    }

    .path-display .fail-text {
      color: var(--accent-bright);
    }

    /* ===== BUTTONS ===== */
    .btn {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.85em;
      padding: 8px 18px;
      border: 2px solid var(--stone-light);
      background: var(--stone);
      color: var(--text);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .btn:hover:not(:disabled) {
      background: var(--stone-light);
      border-color: var(--text-dim);
      color: #fff;
    }

    .btn:active:not(:disabled) {
      background: #3a3a3a;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-run {
      border-color: var(--accent);
      color: var(--accent-bright);
    }

    .btn-run:hover:not(:disabled) {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent-bright);
    }

    .btn-reset {
      border-color: var(--stone-light);
    }

    .btn-pause {
      border-color: #8b8b00;
      color: #aaaa00;
    }

    .btn-pause:hover:not(:disabled) {
      background: #6a6a00;
      color: #fff;
      border-color: #888800;
    }

    /* ===== SELECT ===== */
    select {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.85em;
      padding: 6px 10px;
      background: var(--stone);
      color: var(--text);
      border: 2px solid var(--stone-light);
      outline: none;
      cursor: pointer;
      width: 100%;
    }

    select:focus {
      border-color: var(--accent);
    }

    /* ===== SLIDERS ===== */
    .mixer-group {
      margin-bottom: 10px;
    }

    .mixer-group:last-child {
      margin-bottom: 0;
    }

    .mixer-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75em;
      color: var(--text-dim);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .mixer-value {
      color: var(--accent-bright);
      font-weight: bold;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 8px;
      background: var(--stone);
      border: 1px solid var(--stone-light);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: var(--accent);
      border: 2px solid var(--accent-bright);
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: var(--accent);
      border: 2px solid var(--accent-bright);
      cursor: pointer;
    }

    input[type="range"]:focus {
      border-color: var(--accent);
    }

    /* ===== STATUS PANEL ===== */
    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
    }

    .stat-label {
      font-size: 0.65em;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat-value {
      font-size: 1.1em;
      color: var(--text);
      font-weight: bold;
    }

    .stat-value.state-idle { color: var(--text-dim); }
    .stat-value.state-running { color: #aaaa00; }
    .stat-value.state-win { color: var(--found-text); }
    .stat-value.state-lose { color: var(--accent-bright); }

    /* ===== METER ===== */
    .meter-track {
      width: 100%;
      height: 28px;
      background: var(--stone);
      border: 2px solid var(--stone-light);
      position: relative;
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.4s ease, background 0.4s ease;
      position: absolute;
      left: 0;
      top: 0;
    }

    .meter-fill.low { background: #8b0000; }
    .meter-fill.mid { background: #cc0000; }
    .meter-fill.high { background: #aa3333; }

    .meter-label {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.8em;
      font-weight: bold;
      color: var(--text);
      z-index: 1;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }

    /* ===== WIN/LOSE OVERLAY ===== */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.75);
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay-text {
      font-size: 3em;
      font-weight: bold;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: overlay-fade 0.5s ease-out;
    }

    .overlay-text.win {
      color: var(--found-text);
      text-shadow:
        0 0 20px rgba(106, 170, 106, 0.8),
        0 0 40px rgba(106, 170, 106, 0.4);
    }

    .overlay-text.lose {
      color: var(--accent-bright);
      text-shadow:
        0 0 20px rgba(204, 0, 0, 0.8),
        0 0 40px rgba(204, 0, 0, 0.4);
      animation: overlay-fade 0.5s ease-out, lose-pulse 1s ease-in-out 0.5s infinite;
    }

    @keyframes overlay-fade {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes lose-pulse {
      0%, 100% { text-shadow: 0 0 20px rgba(204, 0, 0, 0.8), 0 0 40px rgba(204, 0, 0, 0.4); }
      50% { text-shadow: 0 0 30px rgba(204, 0, 0, 1), 0 0 60px rgba(204, 0, 0, 0.6), 0 0 80px rgba(204, 0, 0, 0.3); }
    }

    /* ===== BUTTON ROW ===== */
    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .speed-group {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }

    .speed-group label {
      font-size: 0.75em;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .speed-group input[type="range"] {
      width: 120px;
    }

    .speed-group .speed-value {
      font-size: 0.75em;
      color: var(--accent-bright);
      min-width: 30px;
      text-align: right;
    }

    /* ===== MIXER PANEL ===== */
    #mixer-panel {
      min-height: 80px;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--stone);
      border: 1px solid var(--stone-light);
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- HEADER -->
    <div class="header">
      <h1>100 DEAD MEN</h1>
      <div class="subtitle">The Prisoner's Dilemma Simulation</div>
    </div>

    <!-- CONTROLS ROW: Strategy + Mixers, Stats, Speed -->
    <div class="controls-row">
      <!-- Strategy & Mixers Panel -->
      <div class="panel" id="strategy-panel">
        <h2>Strategy</h2>
        <select id="strategy-select"></select>
        <h2 style="margin-top: 12px;">Mixers</h2>
        <div id="mixer-panel">
          <!-- Dynamically rendered -->
        </div>
      </div>

      <!-- Status Panel -->
      <div class="panel" id="status-panel">
        <h2>Status</h2>
        <div class="status-grid">
          <div class="stat-item">
            <span class="stat-label">Round</span>
            <span class="stat-value" id="stat-round">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">State</span>
            <span class="stat-value state-idle" id="stat-state">IDLE</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Prisoner</span>
            <span class="stat-value" id="stat-prisoner">—</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Boxes</span>
            <span class="stat-value" id="stat-boxes">—</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Wins</span>
            <span class="stat-value" id="stat-wins">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Losses</span>
            <span class="stat-value" id="stat-losses">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Success Rate</span>
            <span class="stat-value" id="stat-rate">0%</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Longest Streak</span>
            <span class="stat-value" id="stat-streak">0</span>
          </div>
        </div>
      </div>
    </div>

    <!-- CUMULATIVE METER -->
    <div class="panel">
      <h2>Success Rate</h2>
      <div class="meter-track">
        <div class="meter-fill low" id="meter-fill" style="width: 0%;"></div>
        <span class="meter-label" id="meter-label">0%</span>
      </div>
    </div>

    <!-- BOX GRID -->
    <div class="grid-wrapper">
      <div class="grid" id="box-grid">
        <!-- 100 boxes rendered by JS -->
      </div>
      <!-- OVERLAY -->
      <div class="overlay" id="overlay">
        <div class="overlay-text" id="overlay-text"></div>
      </div>
    </div>

    <!-- PRISONER PATH DISPLAY -->
    <div class="path-display" id="path-display">
      Awaiting execution order...
    </div>

    <!-- CONTROL BUTTONS -->
    <div class="panel">
      <div class="btn-row">
        <button class="btn btn-run" id="btn-run">▶ Run</button>
        <button class="btn btn-pause" id="btn-pause" disabled>⏸ Pause</button>
        <button class="btn btn-reset" id="btn-reset">↺ Reset</button>
        <div class="speed-group">
          <label for="speed-slider">Speed</label>
          <input type="range" id="speed-slider" min="10" max="300" value="50">
          <span class="speed-value" id="speed-value">50</span>
        </div>
      </div>
    </div>
  </div>

  <!-- MODEL — state, pure functions, strategy engine -->
  <script>
  /* ============================================================
     MODEL — State, Permutations, Strategy Engine
     ============================================================ */

  // ===== CENTRAL STATE =====
  const state = {
    boxes: new Array(100).fill(null),
    revealed: new Array(100).fill(false),
    round: 0,
    currentPrisoner: 0,
    prisonerStep: 0,
    roundState: 'IDLE',
    prisonerPath: [],
    strategy: 'loop',
    config: { discipline: 1.0 },
    totalWins: 0,
    totalLosses: 0,
    maxStreak: 0,
    currentStreak: 0,
    history: [],
    running: false,
    speed: 50,
  };

  // ===== PERMUTATION GENERATION =====
  function generatePermutation() {
    const arr = Array.from({ length: 100 }, (_, i) => i);
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    state.boxes = arr;
    state.revealed = new Array(100).fill(false);
    return arr;
  }

  // ===== STRATEGY ENGINE =====
  function getUnexplored() {
    const unexplored = [];
    for (let i = 0; i < 100; i++) {
      if (!state.revealed[i]) unexplored.push(i);
    }
    return unexplored;
  }

  function randomUnexplored() {
    const u = getUnexplored();
    if (u.length === 0) return null;
    return u[Math.floor(Math.random() * u.length)];
  }

  const Strategies = {
    // 1. The Loop Protocol
    loop: {
      name: 'The Loop Protocol',
      mixers: { discipline: { min: 0, max: 1, default: 1.0, step: 0.05 } },
      decide(prisonerId, currentBox, config, stepCount) {
        const discipline = config.discipline;
        if (Math.random() < discipline) {
          // Follow the cycle: first box = prisonerId, then currentBox (from the slip)
          if (stepCount === 0) return prisonerId;
          return currentBox;
        }
        return randomUnexplored();
      }
    },

    // 2. Blind Panic
    panic: {
      name: 'Blind Panic',
      mixers: { memory: { min: 0, max: 1, default: 0.5, step: 0.05 } },
      decide(prisonerId, currentBox, config, stepCount) {
        const memory = config.memory;
        if (memory >= 0.8) return randomUnexplored();
        if (memory <= 0.2) return Math.floor(Math.random() * 100);
        if (Math.random() < memory) return randomUnexplored();
        return Math.floor(Math.random() * 100);
      }
    },

    // 3. Hybrid Ritual
    hybrid: {
      name: 'Hybrid Ritual',
      mixers: {
        faith: { min: 1, max: 50, default: 25, step: 1 },
        panicThreshold: { min: 1, max: 50, default: 10, step: 1 }
      },
      decide(prisonerId, currentBox, config, stepCount) {
        if (stepCount > config.faith || stepCount > config.panicThreshold) {
          return randomUnexplored();
        }
        if (stepCount === 0) return prisonerId;
        return currentBox;
      }
    },

    // 4. Lucky Sacrifice
    sacrifice: {
      name: "Lucky Sacrifice",
      mixers: { obedienceRate: { min: 0, max: 1, default: 0.5, step: 0.05 } },
      _mode: {},
      decide(prisonerId, currentBox, config, stepCount) {
        if (stepCount === 0) {
          this._mode[prisonerId] = Math.random() < config.obedienceRate ? 'loop' : 'panic';
        }
        if (this._mode[prisonerId] === 'loop') {
          if (stepCount === 0) return prisonerId;
          return currentBox;
        }
        return randomUnexplored();
      }
    },

    // 5. Warden's Mercy
    mercy: {
      name: "Warden's Mercy",
      mixers: {
        mercyChance: { min: 0, max: 1, default: 0.1, step: 0.05 },
        extraBoxes: { min: 1, max: 50, default: 10, step: 1 }
      },
      decide(prisonerId, currentBox, config, stepCount) {
        if (stepCount === 0) return prisonerId;
        if (stepCount >= 50) {
          if (Math.random() < config.mercyChance) return randomUnexplored();
          return null;
        }
        return currentBox;
      }
    }
  };

  function applyStrategyDefaults() {
    const s = Strategies[state.strategy];
    state.config = {};
    for (const [key, mixer] of Object.entries(s.mixers)) {
      state.config[key] = mixer.default;
    }
  }

  // ===== SIMULATION LOOP =====
  let simulationAborted = false;

  function sleep(ms) {
    return new Promise(function(resolve) {
      setTimeout(resolve, ms);
    });
  }

  async function prisonerRun(prisonerId) {
    state.currentPrisoner = prisonerId;
    state.prisonerStep = 0;
    state.prisonerPath = [];

    const strategy = Strategies[state.strategy];
    const maxSteps = 50;
    let effectiveMax = maxSteps;
    let currentBox = strategy.decide(prisonerId, null, state.config, 0);

    while (currentBox !== null && currentBox !== undefined) {
      if (state.prisonerStep >= effectiveMax) {
        if (state.strategy === 'mercy') {
          // At standard limit: check mercy
          currentBox = strategy.decide(prisonerId, currentBox, state.config, state.prisonerStep);
          if (currentBox === null) break;
          effectiveMax += state.config.extraBoxes || 10;
          // Don't increment step for the mercy check itself
          continue;
        } else {
          break;
        }
      }

      if (!state.running || simulationAborted) return false;

      state.revealed[currentBox] = true;
      state.prisonerPath.push(currentBox);
      const foundPrisoner = state.boxes[currentBox];
      state.prisonerStep++;

      renderAll();

      if (foundPrisoner === prisonerId) return true;

      await sleep(state.speed);
      currentBox = strategy.decide(prisonerId, state.boxes[currentBox], state.config, state.prisonerStep);
    }

    return false;
  }

  async function runRound() {
    if (simulationAborted) return;

    state.roundState = 'RUNNING';
    state.currentPrisoner = 0;
    state.prisonerStep = 0;
    state.prisonerPath = [];

    // Reset per-round strategy state
    Strategies.sacrifice._mode = {};

    generatePermutation();
    renderAll();
    await sleep(state.speed * 2);

    let allFound = true;
    for (let p = 0; p < 100; p++) {
      if (!state.running || simulationAborted) return;

      const found = await prisonerRun(p);
      if (!found) {
        allFound = false;
        break;
      }
      await sleep(Math.min(state.speed, 30));
    }

    if (simulationAborted) return;

    if (allFound) {
      state.roundState = 'WIN';
      state.totalWins++;
      state.currentStreak++;
      if (state.currentStreak > state.maxStreak) state.maxStreak = state.currentStreak;
      state.history.push('WIN');
    } else {
      state.roundState = 'LOSE';
      state.totalLosses++;
      state.currentStreak = 0;
      state.history.push('LOSE');
    }
    renderAll();
  }

  async function runLoop() {
    simulationAborted = false;
    state.running = true;
    renderAll();

    while (state.running && !simulationAborted) {
      state.round++;
      state.roundState = 'RUNNING';
      renderAll();
      await runRound();
      if (!state.running || simulationAborted) break;
      renderAll();
      await sleep(2000);
      if (!state.running || simulationAborted) break;
    }

    state.running = false;
    renderAll();
  }
  </script>

  <!-- RENDERER — DOM rendering, animations -->
  <script>
  /* ============================================================
     RENDERER — Box grid, status panel, meter, prisoner path
     ============================================================ */

  // Cache box elements
  let boxElements = null;

  function ensureBoxElements() {
    if (boxElements) return;
    const grid = document.getElementById('box-grid');
    grid.innerHTML = '';
    boxElements = [];
    for (let i = 0; i < 100; i++) {
      const div = document.createElement('div');
      div.className = 'box';
      div.dataset.index = i;
      grid.appendChild(div);
      boxElements.push(div);
    }
  }

  function renderBoxGrid() {
    ensureBoxElements();
    const current = state.prisonerPath.length > 0
      ? state.prisonerPath[state.prisonerPath.length - 1]
      : -1;
    const pathSet = new Set(state.prisonerPath);

    for (let i = 0; i < 100; i++) {
      const el = boxElements[i];
      // Reset classes
      el.className = 'box';

      if (state.revealed[i]) {
        el.classList.add('revealed');
        el.textContent = state.boxes[i];
      } else {
        el.textContent = '';
      }

      if (i === current && state.roundState === 'RUNNING') {
        el.classList.add('current');
        // Check if this was a found box
        const prisonerVal = state.boxes[current];
        if (prisonerVal === state.currentPrisoner) {
          el.classList.add('found');
        }
      } else if (pathSet.has(i)) {
        el.classList.add('in-path');
      }

      // If round ended as LOSE and this box is in the failed prisoner's path
      if (state.roundState === 'LOSE' && pathSet.has(i) && i === current) {
        el.classList.add('failed');
      }
    }
  }

  function renderStatusPanel() {
    document.getElementById('stat-round').textContent = state.round;

    const stateEl = document.getElementById('stat-state');
    stateEl.textContent = state.roundState;
    stateEl.className = 'stat-value';
    stateEl.classList.add('state-' + state.roundState.toLowerCase());

    const prisonerEl = document.getElementById('stat-prisoner');
    if (state.roundState === 'RUNNING') {
      prisonerEl.textContent = (state.currentPrisoner + 1) + ' / 100';
    } else {
      prisonerEl.textContent = state.roundState === 'IDLE' ? '—' : (state.currentPrisoner + 1) + ' / 100';
    }

    const boxesEl = document.getElementById('stat-boxes');
    if (state.roundState === 'RUNNING') {
      boxesEl.textContent = state.prisonerStep + ' / 50';
    } else {
      boxesEl.textContent = state.roundState === 'IDLE' ? '—' : state.prisonerStep + ' / 50';
    }

    document.getElementById('stat-wins').textContent = state.totalWins;
    document.getElementById('stat-losses').textContent = state.totalLosses;

    const total = state.totalWins + state.totalLosses;
    const rate = total === 0 ? 0 : (state.totalWins / total) * 100;
    document.getElementById('stat-rate').textContent = rate.toFixed(1) + '%';

    document.getElementById('stat-streak').textContent = state.maxStreak;
  }

  function renderMeter() {
    const total = state.totalWins + state.totalLosses;
    const rate = total === 0 ? 0 : (state.totalWins / total) * 100;

    const fill = document.getElementById('meter-fill');
    fill.style.width = rate + '%';

    // Color thresholds
    fill.className = 'meter-fill';
    if (rate < 30) fill.classList.add('low');
    else if (rate <= 50) fill.classList.add('mid');
    else fill.classList.add('high');

    document.getElementById('meter-label').textContent = rate.toFixed(1) + '%';
  }

  function renderPrisonerPath() {
    const el = document.getElementById('path-display');
    if (state.roundState === 'IDLE') {
      el.innerHTML = 'Awaiting execution order...';
      return;
    }
    if (state.prisonerPath.length === 0) {
      el.innerHTML = 'Prisoner #' + state.currentPrisoner + ' — preparing...';
      return;
    }

    const path = state.prisonerPath;
    const prisonerId = state.currentPrisoner;
    let html = '';

    // Build path steps (show last ~8 steps to avoid overflow)
    const showFrom = Math.max(0, path.length - 12);
    for (let i = showFrom; i < path.length; i++) {
      const boxIdx = path[i];
      const foundVal = state.boxes[boxIdx];
      const isFound = foundVal === prisonerId;
      const isLast = i === path.length - 1;
      if (isFound && isLast) {
        html += 'Prisoner #' + prisonerId + ' — box #' + boxIdx + ' → ' + foundVal + ' <span class="found-text">✓ FOUND</span>';
      } else if (isLast && state.roundState === 'LOSE') {
        html += 'Prisoner #' + prisonerId + ' — box #' + boxIdx + ' → ' + foundVal + ' <span class="fail-text">✗ FAILED</span>';
      } else if (isLast) {
        html += 'Prisoner #' + prisonerId + ' — box #' + boxIdx + ' → ' + foundVal + ' (continues)';
      } else {
        // Only show arrow for non-last in chain
        html += 'box #' + boxIdx + ' → ' + foundVal + ' → ';
      }
    }

    if (state.roundState === 'WIN') {
      html += '<br><span class="found-text">◈ ALL 100 PRISONERS SURVIVED ◈</span>';
    } else if (state.roundState === 'LOSE') {
      html += '<br><span class="fail-text">✖ PRISONER #' + prisonerId + ' EXECUTED</span>';
    }

    el.innerHTML = html;
  }

  function renderMixerPanel() {
    const panel = document.getElementById('mixer-panel');
    const strategy = Strategies[state.strategy];
    panel.innerHTML = '';

    for (const [key, mixer] of Object.entries(strategy.mixers)) {
      const group = document.createElement('div');
      group.className = 'mixer-group';

      const labelRow = document.createElement('div');
      labelRow.className = 'mixer-label';
      const label = document.createElement('span');
      label.textContent = key.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase());
      const val = document.createElement('span');
      val.className = 'mixer-value';
      val.id = 'mixer-val-' + key;
      const currentVal = state.config[key] !== undefined ? state.config[key] : mixer.default;
      val.textContent = mixer.step >= 1 ? currentVal : currentVal.toFixed(2);

      labelRow.appendChild(label);
      labelRow.appendChild(val);

      const input = document.createElement('input');
      input.type = 'range';
      input.min = mixer.min;
      input.max = mixer.max;
      input.step = mixer.step;
      input.value = currentVal;
      input.dataset.mixerKey = key;

      input.addEventListener('input', function(e) {
        const v = parseFloat(e.target.value);
        state.config[key] = v;
        document.getElementById('mixer-val-' + key).textContent = mixer.step >= 1 ? v : v.toFixed(2);
      });

      group.appendChild(labelRow);
      group.appendChild(input);
      panel.appendChild(group);
    }
  }

  function renderOverlay() {
    const overlay = document.getElementById('overlay');
    const text = document.getElementById('overlay-text');

    if (state.roundState === 'WIN') {
      overlay.classList.add('active');
      text.textContent = 'ALL SURVIVED';
      text.className = 'overlay-text win';
    } else if (state.roundState === 'LOSE') {
      overlay.classList.add('active');
      text.textContent = 'EXECUTED';
      text.className = 'overlay-text lose';
    } else {
      overlay.classList.remove('active');
    }
  }

  function renderAll() {
    renderBoxGrid();
    renderStatusPanel();
    renderMeter();
    renderPrisonerPath();
    renderOverlay();
  }

  function renderStrategySelector() {
    const select = document.getElementById('strategy-select');
    select.innerHTML = '';
    for (const [key, s] of Object.entries(Strategies)) {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = s.name;
      if (key === state.strategy) opt.selected = true;
      select.appendChild(opt);
    }
  }
  </script>

  <!-- CONTROLLER — event listeners, simulation loop, init -->
  <script>
  /* ============================================================
     CONTROLLER — Sleep, run loop, event handlers, init
     ============================================================ */

  // ===== EVENT HANDLERS =====
  function onRun() {
    if (state.running) return;
    // If we're starting fresh (not resuming after pause)
    if (state.roundState === 'IDLE' || state.roundState === 'WIN' || state.roundState === 'LOSE') {
      state.round = 0;
      state.currentPrisoner = 0;
      state.prisonerStep = 0;
      state.prisonerPath = [];
      state.roundState = 'IDLE';
    }
    simulationAborted = false;
    runLoop();
    updateButtonStates();
  }

  function onPause() {
    state.running = false;
    simulationAborted = true;
    updateButtonStates();
  }

  function onReset() {
    state.running = false;
    simulationAborted = true;
    state.round = 0;
    state.currentPrisoner = 0;
    state.prisonerStep = 0;
    state.roundState = 'IDLE';
    state.prisonerPath = [];
    state.totalWins = 0;
    state.totalLosses = 0;
    state.maxStreak = 0;
    state.currentStreak = 0;
    state.history = [];
    generatePermutation();
    renderAll();
    updateButtonStates();
  }

  function onStrategyChange(value) {
    state.strategy = value;
    applyStrategyDefaults();
    renderMixerPanel();
    renderAll();
  }

  function onSpeedChange(value) {
    state.speed = parseInt(value, 10);
    document.getElementById('speed-value').textContent = value;
  }

  function updateButtonStates() {
    document.getElementById('btn-run').disabled = state.running;
    document.getElementById('btn-pause').disabled = !state.running;
  }

  // ===== EVENT LISTENERS =====
  function attachEventListeners() {
    // Strategy selector
    document.getElementById('strategy-select').addEventListener('change', function(e) {
      onStrategyChange(e.target.value);
    });

    // Run button
    document.getElementById('btn-run').addEventListener('click', onRun);

    // Pause button
    document.getElementById('btn-pause').addEventListener('click', onPause);

    // Reset button
    document.getElementById('btn-reset').addEventListener('click', onReset);

    // Speed slider
    document.getElementById('speed-slider').addEventListener('input', function(e) {
      onSpeedChange(e.target.value);
    });
  }

  // ===== INIT =====
  function init() {
    generatePermutation();
    renderStrategySelector();
    applyStrategyDefaults();
    renderMixerPanel();
    renderAll();
    attachEventListeners();
    updateButtonStates();
  }

  // Boot
  document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
