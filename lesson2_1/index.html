<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>100 DEAD MEN — Prisoner Simulation</title>
  <style>
    /* ============================================================
       CSS THEME — Dark Pixel-Prison (Bloodborne-Inspired)
       ============================================================ */
    :root {
      --bg: #0a0a0a;
      --panel: #1a1a1a;
      --stone: #2c2c2c;
      --stone-light: #4a4a4a;
      --text: #c8c8c8;
      --text-dim: #666666;
      --accent: #8b0000;
      --accent-bright: #cc0000;
      --found: #2a5a2a;
      --found-text: #6aaa6a;
      --fail: #3a1a1a;
      --fail-bright: #6a1a1a;
      --border-px: 2px;
      --header-h: 48px;
      --bottom-h: 48px;
      --sidebar-w: 175px;
      --path-h: 32px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px;
    }

    /* ===== MAIN CONTAINER ===== */
    #app {
      width: 100%;
      max-width: 1200px;
      max-height: calc(100vh - 16px);
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* ===== HEADER ROW ===== */
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--header-h);
      min-height: var(--header-h);
      padding: 0 12px;
      border-bottom: var(--border-px) double var(--stone);
    }

    .header-row h1 {
      font-size: 1.6em;
      font-weight: bold;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #8b0000;
      text-shadow:
        0 0 10px rgba(139, 0, 0, 0.6),
        0 0 20px rgba(139, 0, 0, 0.4);
      animation: pulse-glow 3s ease-in-out infinite;
      font-family: 'Courier New', Courier, monospace;
      white-space: nowrap;
    }

    @keyframes pulse-glow {
      0%, 100% { text-shadow: 0 0 10px rgba(139, 0, 0, 0.6), 0 0 20px rgba(139, 0, 0, 0.4); }
      50% { text-shadow: 0 0 15px rgba(139, 0, 0, 0.9), 0 0 30px rgba(139, 0, 0, 0.6); }
    }

    .header-row .subtitle {
      color: var(--text-dim);
      font-size: 0.6em;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-left: 8px;
    }

    /* ===== MUGSHOT CARD ===== */
    .mugshot-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--panel);
      border: 2px solid var(--stone);
      padding: 6px 14px 6px 10px;
      height: calc(var(--header-h) - 6px);
      min-width: 240px;
      position: relative;
    }

    .mugshot-card .mugshot-badge {
      width: 36px;
      height: 36px;
      min-width: 36px;
      border: 2px solid var(--stone-light);
      background: var(--stone);
      display: flex;
      align-items: center;
      justify-content: center;
      image-rendering: pixelated;
    }

    .mugshot-card .mugshot-badge canvas {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    .mugshot-card .mugshot-name {
      font-size: 0.7em;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 90px;
    }

    .mugshot-card .mugshot-number {
      font-size: 0.6em;
      color: var(--text-dim);
    }

    .mugshot-card .mugshot-status {
      font-size: 0.55em;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-left: auto;
      white-space: nowrap;
    }

    .mugshot-status.searching {
      color: #aaaa00;
      animation: blink 0.8s ease-in-out infinite;
    }

    .mugshot-status.found {
      color: var(--found-text);
    }

    .mugshot-status.executed {
      color: var(--accent-bright);
      animation: blink 0.4s ease-in-out infinite;
    }

    .mugshot-status.idle {
      color: var(--text-dim);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ===== MIDDLE AREA ===== */
    .middle-area {
      display: flex;
      gap: 6px;
      flex: 1;
      min-height: 0;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .sidebar::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar::-webkit-scrollbar-track {
      background: var(--bg);
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: var(--stone);
    }

    .panel {
      background: var(--panel);
      border: var(--border-px) double var(--stone);
      padding: 8px 10px;
    }

    .panel h2 {
      font-size: 0.7em;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 6px;
      border-bottom: 1px solid var(--stone);
      padding-bottom: 4px;
    }

    .panel h3 {
      font-size: 0.65em;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    /* ===== SELECT ===== */
    select {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.7em;
      padding: 4px 6px;
      background: var(--stone);
      color: var(--text);
      border: 1px solid var(--stone-light);
      outline: none;
      cursor: pointer;
      width: 100%;
    }

    select:focus {
      border-color: var(--accent);
    }

    /* ===== SLIDERS ===== */
    .mixer-group {
      margin-bottom: 4px;
    }

    .mixer-group:last-child {
      margin-bottom: 0;
    }

    .mixer-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.6em;
      color: var(--text-dim);
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .mixer-value {
      color: var(--accent-bright);
      font-weight: bold;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: var(--stone);
      border: 1px solid var(--stone-light);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: var(--accent);
      border: 2px solid var(--accent-bright);
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: var(--accent);
      border: 2px solid var(--accent-bright);
      cursor: pointer;
    }

    /* ===== BUTTONS ===== */
    .btn-row {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .btn {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.65em;
      padding: 5px 10px;
      border: 1px solid var(--stone-light);
      background: var(--stone);
      color: var(--text);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: background 0.15s, border-color 0.15s;
      flex: 1;
      min-width: 40px;
      text-align: center;
    }

    .btn:hover:not(:disabled) {
      background: var(--stone-light);
      border-color: var(--text-dim);
      color: #fff;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-run { border-color: var(--accent); color: var(--accent-bright); }
    .btn-run:hover:not(:disabled) { background: var(--accent); color: #fff; border-color: var(--accent-bright); }
    .btn-pause { border-color: #8b8b00; color: #aaaa00; }
    .btn-pause:hover:not(:disabled) { background: #6a6a00; color: #fff; border-color: #888800; }

    .speed-group {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      margin-top: 4px;
    }

    .speed-group label {
      font-size: 0.6em;
      color: var(--text-dim);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .speed-group input[type="range"] {
      flex: 1;
    }

    .speed-group .speed-value {
      font-size: 0.65em;
      color: var(--accent-bright);
      min-width: 24px;
      text-align: right;
    }

    /* ===== GRID AREA ===== */
    .center-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .grid-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      position: relative;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 3px;
      background: var(--panel);
      border: var(--border-px) double var(--stone);
      padding: 5px;
      width: 100%;
      max-width: 560px;
      aspect-ratio: 1;
    }

    .box {
      aspect-ratio: 1;
      background: var(--stone);
      border: 1px solid var(--stone-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.55em;
      font-family: 'Courier New', Courier, monospace;
      color: var(--text-dim);
      cursor: default;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      position: relative;
    }

    .box.revealed {
      background: #1a1a2a;
      border-color: var(--stone-light);
      color: var(--text);
    }

    .box.visited {
      background: var(--fail);
      border-color: #5a2222;
      color: #885555;
    }

    .box.visited.prisoner-colored {
      filter: saturate(0.6) brightness(1.2);
    }

    .box.current {
      background: #3a0000;
      border-color: var(--accent-bright);
      color: var(--accent-bright);
      box-shadow: 0 0 6px rgba(204, 0, 0, 0.5);
      z-index: 2;
      animation: current-pulse 0.6s ease-in-out infinite;
    }

    .box.current.flash-green {
      background: var(--found);
      border-color: var(--found-text);
      color: var(--found-text);
      box-shadow: 0 0 10px rgba(106, 170, 106, 0.6);
      animation: current-found 0.4s ease-in-out;
    }

    @keyframes current-pulse {
      0%, 100% { box-shadow: 0 0 4px var(--prisoner-glow); }
      50% { box-shadow: 0 0 12px var(--prisoner-glow), 0 0 20px var(--prisoner-glow-dim); }
    }

    @keyframes current-found {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .box.found {
      background: var(--found);
      border-color: var(--found-text);
      color: var(--found-text);
      box-shadow: inset 0 0 6px rgba(106, 170, 106, 0.3);
    }

    .box.failed {
      background: #2a0000;
      border-color: var(--fail-bright);
      color: #aa3333;
    }

    /* ===== PATH CONNECTION LINES ===== */
    .path-lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 3;
      overflow: visible;
    }

    .box .step-label {
      position: absolute;
      top: -2px;
      right: -2px;
      font-size: 0.5em;
      color: var(--text-dim);
      background: rgba(0,0,0,0.7);
      padding: 0 2px;
      line-height: 1;
    }


    /* ===== PATH STRIPE ===== */
    .path-stripe {
      height: var(--path-h);
      min-height: var(--path-h);
      background: var(--panel);
      border: var(--border-px) double var(--stone);
      padding: 4px 10px;
      font-size: 0.7em;
      color: var(--text);
      line-height: 1.4;
      display: flex;
      align-items: center;
      overflow: hidden;
      white-space: nowrap;
      font-family: 'Courier New', Courier, monospace;
    }

    .path-stripe .found-text {
      color: var(--found-text);
      font-weight: bold;
    }

    .path-stripe .fail-text {
      color: var(--accent-bright);
      font-weight: bold;
    }

    .path-stripe .arrow {
      color: var(--text-dim);
      margin: 0 3px;
    }

    .path-stripe .step-marker {
      font-weight: bold;
    }

    .pulse-name {
      animation: name-pulse 0.9s ease-in-out infinite;
    }

    @keyframes name-pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    /* ===== BOTTOM BAR ===== */
    .bottom-bar {
      height: var(--bottom-h);
      min-height: var(--bottom-h);
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--panel);
      border: var(--border-px) double var(--stone);
      padding: 0 12px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .stat-label {
      font-size: 0.6em;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .stat-value {
      font-size: 0.7em;
      color: var(--text);
      font-weight: bold;
      min-width: 20px;
    }

    .stat-value.state-idle { color: var(--text-dim); }
    .stat-value.state-running { color: #aaaa00; }
    .stat-value.state-win { color: var(--found-text); }
    .stat-value.state-lose { color: var(--accent-bright); }

    .bottom-meter {
      flex: 1;
      height: 18px;
      background: var(--stone);
      border: 1px solid var(--stone-light);
      position: relative;
      overflow: hidden;
      min-width: 80px;
      max-width: 200px;
    }

    .bottom-meter .meter-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.4s ease, background 0.4s ease;
      position: absolute;
      left: 0;
      top: 0;
    }

    .bottom-meter .meter-fill.low { background: #8b0000; }
    .bottom-meter .meter-fill.mid { background: #cc0000; }
    .bottom-meter .meter-fill.high { background: var(--found-text); }

    .bottom-meter .meter-label {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.6em;
      font-weight: bold;
      color: var(--text);
      z-index: 1;
      text-shadow: 0 0 3px rgba(0,0,0,0.9);
    }

    /* ===== WIN/LOSE OVERLAY ===== */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.75);
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay-text {
      font-size: 2.5em;
      font-weight: bold;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: overlay-fade 0.5s ease-out;
    }

    .overlay-text.win {
      color: var(--found-text);
      text-shadow: 0 0 20px rgba(106, 170, 106, 0.8), 0 0 40px rgba(106, 170, 106, 0.4);
    }

    .overlay-text.lose {
      color: var(--accent-bright);
      text-shadow: 0 0 20px rgba(204, 0, 0, 0.8), 0 0 40px rgba(204, 0, 0, 0.4);
      animation: overlay-fade 0.5s ease-out, lose-pulse 1s ease-in-out 0.5s infinite;
    }

    @keyframes overlay-fade {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes lose-pulse {
      0%, 100% { text-shadow: 0 0 20px rgba(204, 0, 0, 0.8), 0 0 40px rgba(204, 0, 0, 0.4); }
      50% { text-shadow: 0 0 30px rgba(204, 0, 0, 1), 0 0 60px rgba(204, 0, 0, 0.6); }
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--stone);
      border: 1px solid var(--stone-light);
    }

    /* ===== STATES ===== */
    #mixer-panel {
      min-height: 40px;
    }

    .round-badge {
      font-size: 0.55em;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- HEADER ROW -->
    <div class="header-row">
      <div style="display:flex;align-items:center;gap:12px;">
        <h1>100 DEAD MEN</h1>
        <span class="subtitle">Prisoner Simulation</span>
      </div>
      <div class="mugshot-card" id="mugshot-card">
        <div class="mugshot-badge" id="mugshot-badge">
          <canvas id="mugshot-canvas" width="36" height="36"></canvas>
        </div>
        <div>
          <div class="mugshot-name" id="mugshot-name">—</div>
          <div class="mugshot-number" id="mugshot-number">#—</div>
        </div>
        <div class="mugshot-status idle" id="mugshot-status">AWAITING ORDER</div>
      </div>
    </div>

    <!-- MIDDLE AREA -->
    <div class="middle-area">
      <!-- SIDEBAR: Controls -->
      <div class="sidebar">
        <div class="panel" id="strategy-panel">
          <h2>Strategy</h2>
          <select id="strategy-select"></select>
          <h2 style="margin-top:8px;">Mixers</h2>
          <div id="mixer-panel"></div>
        </div>
        <div class="panel">
          <div class="btn-row">
            <button class="btn btn-run" id="btn-run">▶</button>
            <button class="btn btn-pause" id="btn-pause" disabled>⏸</button>
            <button class="btn btn-reset" id="btn-reset">↺</button>
          </div>
          <div class="speed-group">
            <label for="speed-slider">Speed</label>
            <input type="range" id="speed-slider" min="10" max="300" value="50">
            <span class="speed-value" id="speed-value">50</span>
          </div>
          <div class="round-badge" id="round-badge">Round: 0</div>
        </div>
      </div>

      <!-- CENTER: Box Grid + Path -->
      <div class="center-area">
        <div class="grid-wrapper">
          <div class="grid" id="box-grid"></div>
          <svg class="path-lines" id="path-lines" preserveAspectRatio="xMidYMid meet"></svg>
          <div class="overlay" id="overlay">
            <div class="overlay-text" id="overlay-text"></div>
          </div>
        </div>
        <div class="path-stripe" id="path-stripe">Awaiting execution order...</div>
      </div>
    </div>

    <!-- BOTTOM BAR -->
    <div class="bottom-bar">
      <div class="stat-item">
        <span class="stat-label">Wins</span>
        <span class="stat-value" id="stat-wins">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Losses</span>
        <span class="stat-value" id="stat-losses">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Rate</span>
        <span class="stat-value" id="stat-rate">0%</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Streak</span>
        <span class="stat-value" id="stat-streak">0</span>
      </div>
      <div class="stat-item" style="margin-left:auto;">
        <span class="stat-label">State</span>
        <span class="stat-value state-idle" id="stat-state">IDLE</span>
      </div>
      <div class="bottom-meter">
        <div class="meter-fill low" id="meter-fill" style="width:0%;"></div>
        <span class="meter-label" id="meter-label">0%</span>
      </div>
    </div>
  </div>

  <!-- ===== PRISONER DB & AVATAR GENERATION ===== -->
  <script>
  /* ============================================================
     PRISONER IDENTITY — Name pool, pixel avatar generation
     ============================================================ */

  const FIRST_NAMES = [
    'Ivan','Dmitri','Alexei','Nikolai','Vladimir','Boris','Sergei','Mikhail','Pavel','Yuri',
    'Andrei','Konstantin','Oleg','Maxim','Viktor','Grigori','Anton','Valentin','Roman','Eduard',
    'Semyon','Ignat','Arkadi','Leonid','Vasili','Fyodor','Gennadi','Stepan','Yaroslav','Taras',
    'Bogdan','Zakhar','Artem','Danil','Makar','Timur','Ruslan','Marat','David','Daniel'
  ];

  const LAST_NAMES = [
    'Volkov','Morozov','Kozlov','Petrov','Sokolov','Romanov','Fedorov','Ivanov','Smirnov','Kuznetsov',
    'Popov','Lebedev','Novikov','Zaitsev','Baranov','Sorokin','Belyaev','Titov','Gromov','Alexandrov',
    'Chernov','Orlov','Yakovlev','Vorobiev','Vinogradov','Karpov','Mironov','Lavrov','Timofeev','Matveev',
    'Scheglov','Astakhov','Zolotov','Krutov','Serebrov','Belov','Isaev','Medvedev','Voropaev','Sudakov'
  ];

  // Earth/blood/slate color gamut for prisoner unique colors
  function prisonerColor(index) {
    const hue = ((index * 137.508) % 360 + 360) % 360; // golden angle distribution
    // Clamp to earth/blood/slate range: 0-30 (reds), 200-280 (blues), 340-360 (purples)
    let h = hue;
    if (h > 30 && h < 200) h = ((h - 30) / 170) * 60 + 200; // squeeze into blue range
    if (h > 280 && h < 340) h = ((h - 280) / 60) * 20 + 340; // squeeze into purple range
    return `hsl(${h}, 45%, 45%)`;
  }

  function seededRandom(seed) {
    let s = seed;
    return function() {
      s = (s * 16807 + 0) % 2147483647;
      return (s - 1) / 2147483646;
    };
  }

  function generatePixelAvatar(seed, color) {
    const size = 30;
    const scale = 4;
    const canvas = document.createElement('canvas');
    canvas.width = size * scale;
    canvas.height = size * scale;
    const ctx = canvas.getContext('2d');

    // Draw at pixel resolution then scale up
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = size;
    tempCanvas.height = size;
    const tctx = tempCanvas.getContext('2d');

    const rng = seededRandom(seed);

    // Skin tone (dark/morbid palette)
    const skinTones = [
      '#8B7355','#7A6B4E','#6B5B45','#5C4D3B','#4D4032',
      '#9E7E5C','#8E7050','#7E6244','#6E553A','#A08060'
    ];
    const skin = skinTones[Math.floor(rng() * skinTones.length)];

    // Hair color
    const hairColors = ['#1a1a1a','#2a2a2a','#3a3028','#4a3a28','#222222','#332211','#2a1a0a','#444444'];
    const hair = hairColors[Math.floor(rng() * hairColors.length)];

    // Hair style (bald, short, receding, mohawk, messy)
    const hairStyle = Math.floor(rng() * 5);

    // Clear
    tctx.fillStyle = 'transparent';
    tctx.clearRect(0, 0, size, size);

    // Head shape (oval)
    tctx.fillStyle = skin;
    tctx.beginPath();
    tctx.ellipse(15, 17, 8, 11, 0, 0, Math.PI * 2);
    tctx.fill();

    // Hair
    tctx.fillStyle = hair;
    if (hairStyle === 0) {
      // Bald — nothing
    } else if (hairStyle === 1) {
      // Short buzz
      tctx.fillRect(7, 4, 16, 6);
      tctx.fillRect(6, 6, 18, 4);
    } else if (hairStyle === 2) {
      // Receding
      tctx.fillRect(8, 4, 14, 5);
      tctx.fillRect(7, 6, 6, 3);
      tctx.fillRect(17, 6, 6, 3);
    } else if (hairStyle === 3) {
      // Mohawk
      tctx.fillRect(12, 2, 6, 8);
      tctx.fillRect(11, 5, 8, 4);
    } else if (hairStyle === 4) {
      // Messy
      tctx.fillRect(6, 4, 18, 5);
      tctx.fillRect(5, 6, 5, 3);
      tctx.fillRect(20, 6, 5, 3);
      tctx.fillRect(10, 3, 10, 4);
    }

    // Eyes
    tctx.fillStyle = '#222';
    const eyeL = 10 + (rng() > 0.5 ? 1 : 0);
    const eyeR = 18 + (rng() > 0.5 ? 1 : 0);
    const eyeY = 16 + (rng() > 0.5 ? 1 : 0);
    tctx.fillRect(eyeL, eyeY, 2, 2);
    tctx.fillRect(eyeR, eyeY, 2, 2);

    // Eyebrows
    tctx.fillStyle = hair;
    tctx.fillRect(eyeL - 1, eyeY - 3, 4, 1);
    tctx.fillRect(eyeR - 1, eyeY - 3, 4, 1);

    // Nose
    tctx.fillStyle = skin.replace('#', '#7'); // darker skin
    tctx.fillRect(14, 19, 2, 3);

    // Mouth
    tctx.fillStyle = '#442222';
    const mouthOpen = rng() > 0.6;
    if (mouthOpen) {
      tctx.fillRect(11, 23, 8, 2);
    } else {
      tctx.fillRect(12, 23, 6, 1);
    }

    // Prison uniform collar
    tctx.fillStyle = color;
    tctx.fillRect(8, 26, 14, 4);
    tctx.fillStyle = '#222';
    tctx.fillRect(13, 26, 4, 4);

    // Scale up
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(tempCanvas, 0, 0, size * scale, size * scale);

    return canvas.toDataURL();
  }

  // Build prisoner database
  let prisoners = [];

  function initPrisoners() {
    prisoners = [];
    const shuffledFirst = [...FIRST_NAMES];
    const shuffledLast = [...LAST_NAMES];
    // Fisher-Yates shuffle
    for (let i = shuffledFirst.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffledFirst[i], shuffledFirst[j]] = [shuffledFirst[j], shuffledFirst[i]];
    }
    for (let i = shuffledLast.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffledLast[i], shuffledLast[j]] = [shuffledLast[j], shuffledLast[i]];
    }

    // Make 100 unique names by cycling
    for (let i = 0; i < 100; i++) {
      const firstName = shuffledFirst[i % shuffledFirst.length];
      const lastName = shuffledLast[Math.floor(i / shuffledFirst.length) % shuffledLast.length];
      const id = i;
      const color = prisonerColor(i);
      const avatar = generatePixelAvatar(i * 777 + 13, color);
      prisoners.push({ id, firstName, lastName, color, avatar });
    }
  }

  <!-- MODEL — state, pure functions, strategy engine -->
  <script>
  /* ============================================================
     MODEL — State, Permutations, Strategy Engine
     ============================================================ */

  // ===== CENTRAL STATE =====
  const state = {
    boxes: new Array(100).fill(null),
    revealed: new Array(100).fill(false),
    round: 0,
    currentPrisoner: 0,
    prisonerStep: 0,
    roundState: 'IDLE',
    prisonerPath: [],
    strategy: 'loop',
    config: { discipline: 1.0 },
    totalWins: 0,
    totalLosses: 0,
    maxStreak: 0,
    currentStreak: 0,
    history: [],
    running: false,
    speed: 50,
  };

  // ===== PERMUTATION GENERATION =====
  function generatePermutation() {
    const arr = Array.from({ length: 100 }, (_, i) => i);
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    state.boxes = arr;
    state.revealed = new Array(100).fill(false);
    return arr;
  }

  // ===== STRATEGY ENGINE =====
  function getUnexplored() {
    const unexplored = [];
    for (let i = 0; i < 100; i++) {
      if (!state.revealed[i]) unexplored.push(i);
    }
    return unexplored;
  }

  function randomUnexplored() {
    const u = getUnexplored();
    if (u.length === 0) return null;
    return u[Math.floor(Math.random() * u.length)];
  }

  const Strategies = {
    loop: {
      name: 'The Loop Protocol',
      mixers: { discipline: { min: 0, max: 1, default: 1.0, step: 0.05 } },
      decide(prisonerId, currentBox, config, stepCount) {
        const discipline = config.discipline;
        if (Math.random() < discipline) {
          if (stepCount === 0) return prisonerId;
          return currentBox;
        }
        return randomUnexplored();
      }
    },
    panic: {
      name: 'Blind Panic',
      mixers: { memory: { min: 0, max: 1, default: 0.5, step: 0.05 } },
      decide(prisonerId, currentBox, config, stepCount) {
        const memory = config.memory;
        if (memory >= 0.8) return randomUnexplored();
        if (memory <= 0.2) return Math.floor(Math.random() * 100);
        if (Math.random() < memory) return randomUnexplored();
        return Math.floor(Math.random() * 100);
      }
    },
    hybrid: {
      name: 'Hybrid Ritual',
      mixers: {
        faith: { min: 1, max: 50, default: 25, step: 1 },
        panicThreshold: { min: 1, max: 50, default: 10, step: 1 }
      },
      decide(prisonerId, currentBox, config, stepCount) {
        if (stepCount > config.faith || stepCount > config.panicThreshold) {
          return randomUnexplored();
        }
        if (stepCount === 0) return prisonerId;
        return currentBox;
      }
    },
    sacrifice: {
      name: "Lucky Sacrifice",
      mixers: { obedienceRate: { min: 0, max: 1, default: 0.5, step: 0.05 } },
      _mode: {},
      decide(prisonerId, currentBox, config, stepCount) {
        if (stepCount === 0) {
          this._mode[prisonerId] = Math.random() < config.obedienceRate ? 'loop' : 'panic';
        }
        if (this._mode[prisonerId] === 'loop') {
          if (stepCount === 0) return prisonerId;
          return currentBox;
        }
        return randomUnexplored();
      }
    },
    mercy: {
      name: "Warden's Mercy",
      mixers: {
        mercyChance: { min: 0, max: 1, default: 0.1, step: 0.05 },
        extraBoxes: { min: 1, max: 50, default: 10, step: 1 }
      },
      decide(prisonerId, currentBox, config, stepCount) {
        if (stepCount === 0) return prisonerId;
        if (stepCount >= 50) {
          if (Math.random() < config.mercyChance) return randomUnexplored();
          return null;
        }
        return currentBox;
      }
    }
  };

  function applyStrategyDefaults() {
    const s = Strategies[state.strategy];
    state.config = {};
    for (const [key, mixer] of Object.entries(s.mixers)) {
      state.config[key] = mixer.default;
    }
  }

  // ===== SIMULATION LOOP =====
  let simulationAborted = false;

  function sleep(ms) {
    return new Promise(function(resolve) {
      setTimeout(resolve, ms);
    });
  }

  async function prisonerRun(prisonerId) {
    state.currentPrisoner = prisonerId;
    state.prisonerStep = 0;
    state.prisonerPath = [];

    const strategy = Strategies[state.strategy];
    const maxSteps = 50;
    let effectiveMax = maxSteps;
    let currentBox = strategy.decide(prisonerId, null, state.config, 0);

    while (currentBox !== null && currentBox !== undefined) {
      if (state.prisonerStep >= effectiveMax) {
        if (state.strategy === 'mercy') {
          currentBox = strategy.decide(prisonerId, currentBox, state.config, state.prisonerStep);
          if (currentBox === null) break;
          effectiveMax += state.config.extraBoxes || 10;
          continue;
        } else {
          break;
        }
      }

      if (!state.running || simulationAborted) return false;

      state.revealed[currentBox] = true;
      state.prisonerPath.push(currentBox);
      const foundPrisoner = state.boxes[currentBox];
      state.prisonerStep++;

      renderAll();

      if (foundPrisoner === prisonerId) return true;

      await sleep(state.speed);
      currentBox = strategy.decide(prisonerId, state.boxes[currentBox], state.config, state.prisonerStep);
    }

    return false;
  }

  async function runRound() {
    if (simulationAborted) return;

    state.roundState = 'RUNNING';
    state.currentPrisoner = 0;
    state.prisonerStep = 0;
    state.prisonerPath = [];

    Strategies.sacrifice._mode = {};

    generatePermutation();
    renderAll();
    await sleep(state.speed * 2);

    let allFound = true;
    for (let p = 0; p < 100; p++) {
      if (!state.running || simulationAborted) return;

      const found = await prisonerRun(p);
      if (!found) {
        allFound = false;
        break;
      }
      await sleep(Math.min(state.speed, 30));
    }

    if (simulationAborted) return;

    if (allFound) {
      state.roundState = 'WIN';
      state.totalWins++;
      state.currentStreak++;
      if (state.currentStreak > state.maxStreak) state.maxStreak = state.currentStreak;
      state.history.push('WIN');
    } else {
      state.roundState = 'LOSE';
      state.totalLosses++;
      state.currentStreak = 0;
      state.history.push('LOSE');
    }
    renderAll();
  }

  async function runLoop() {
    simulationAborted = false;
    state.running = true;
    renderAll();

    while (state.running && !simulationAborted) {
      state.round++;
      state.roundState = 'RUNNING';
      renderAll();
      await runRound();
      if (!state.running || simulationAborted) break;
      renderAll();
      await sleep(2000);
      if (!state.running || simulationAborted) break;
    }

    state.running = false;
    renderAll();
  }
  </script>

  <!-- RENDERER — DOM rendering, mugshot, grid, path, stats -->
  <script>
  /* ============================================================
     RENDERER — Box grid, mugshot card, path stripe, stats, meter
     ============================================================ */

  let boxElements = null;

  function ensureBoxElements() {
    if (boxElements) return;
    const grid = document.getElementById('box-grid');
    grid.innerHTML = '';
    boxElements = [];
    for (let i = 0; i < 100; i++) {
      const div = document.createElement('div');
      div.className = 'box';
      div.dataset.index = i;
      grid.appendChild(div);
      boxElements.push(div);
    }
  }

  function renderMugshot() {
    const canvas = document.getElementById('mugshot-canvas');
    const nameEl = document.getElementById('mugshot-name');
    const numEl = document.getElementById('mugshot-number');
    const statusEl = document.getElementById('mugshot-status');
    const card = document.getElementById('mugshot-card');

    if (state.roundState === 'IDLE' && state.prisonerPath.length === 0) {
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(0, 0, 36, 36);
      ctx.fillStyle = '#444';
      ctx.font = '18px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('?', 18, 24);
      nameEl.textContent = '—';
      numEl.textContent = '#—';
      statusEl.textContent = 'AWAITING ORDER';
      statusEl.className = 'mugshot-status idle';
      card.style.borderColor = 'var(--stone)';
      return;
    }

    const pid = state.currentPrisoner;
    const p = prisoners[pid];
    if (!p) return;

    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.onload = function() {
      ctx.drawImage(img, 0, 0, 36, 36);
    };
    img.src = p.avatar;

    nameEl.textContent = p.lastName + ', ' + p.firstName;
    numEl.textContent = '#' + String(pid + 1).padStart(2, '0');
    card.style.borderColor = p.color;

    if (state.roundState === 'RUNNING') {
      statusEl.textContent = 'SEARCHING';
      statusEl.className = 'mugshot-status searching';
    } else if (state.roundState === 'WIN') {
      statusEl.textContent = 'SURVIVED';
      statusEl.className = 'mugshot-status found';
    } else if (state.roundState === 'LOSE') {
      statusEl.textContent = 'EXECUTED';
      statusEl.className = 'mugshot-status executed';
    } else {
      statusEl.textContent = 'AWAITING ORDER';
      statusEl.className = 'mugshot-status idle';
    }
  }

  function renderBoxGrid() {
    ensureBoxElements();
    const current = state.prisonerPath.length > 0
      ? state.prisonerPath[state.prisonerPath.length - 1]
      : -1;
    const pathSet = new Set(state.prisonerPath);
    const pid = state.currentPrisoner;
    const p = prisoners[pid];
    const pColor = p ? p.color : null;

    for (let i = 0; i < 100; i++) {
      const el = boxElements[i];
      el.className = 'box';

      if (state.revealed[i]) {
        el.classList.add('revealed');
        el.textContent = state.boxes[i];
      } else {
        el.textContent = '';
      }

      const stepIdx = state.prisonerPath.indexOf(i);
      if (stepIdx !== -1 && i !== current) {
        el.classList.add('visited');
        if (pColor) {
          el.style.borderColor = pColor;
          el.style.background = pColor + '33';
          el.style.color = pColor;
        }
        const oldLabel = el.querySelector('.step-label');
        if (oldLabel) oldLabel.remove();
        const label = document.createElement('span');
        label.className = 'step-label';
        label.textContent = stepIdx + 1;
        el.appendChild(label);
      } else if (stepIdx === -1 && !state.revealed[i]) {
        el.style.borderColor = '';
        el.style.background = '';
        el.style.color = '';
      }

      if (i === current && state.roundState === 'RUNNING') {
        el.classList.add('current');
        if (pColor) {
          el.style.setProperty('--prisoner-glow', pColor);
          el.style.setProperty('--prisoner-glow-dim', pColor + '44');
          el.style.borderColor = pColor;
          el.style.background = pColor + '22';
          el.style.color = pColor;
        }
        const prisonerVal = state.boxes[current];
        if (prisonerVal === state.currentPrisoner) {
          el.classList.add('flash-green');
          el.style.borderColor = '';
          el.style.background = '';
          el.style.color = '';
        }
      }

      if (state.roundState === 'LOSE' && pathSet.has(i) && i === current) {
        el.classList.add('failed');
        el.style.borderColor = '';
        el.style.background = '';
        el.style.color = '';
      }
    }
  }

  function renderPathStripe() {
    const el = document.getElementById('path-stripe');
    if (state.roundState === 'IDLE' && state.prisonerPath.length === 0) {
      el.innerHTML = 'Awaiting execution order...';
      return;
    }
    if (state.prisonerPath.length === 0) {
      const p = prisoners[state.currentPrisoner];
      const name = p ? p.lastName + ', ' + p.firstName : 'Prisoner #' + state.currentPrisoner;
      el.innerHTML = '<span style="color:' + (p ? p.color : '#888') + ';">' + name + '</span>' + ' — preparing...';
      return;
    }

    const path = state.prisonerPath;
    const prisonerId = state.currentPrisoner;
    const p = prisoners[prisonerId];
    const pColor = p ? p.color : '#888';

    // Show last 8 steps
    const showFrom = Math.max(0, path.length - 8);
    let html = '';

    // Prisoner name at start — pulsing during RUNNING
    const name = p ? p.lastName + ', ' + p.firstName : '#' + prisonerId;
    const pulseClass = state.roundState === 'RUNNING' ? ' class="pulse-name"' : '';
    html += '<span style="color:' + pColor + ';"' + pulseClass + '>' + name + '</span> ';

    for (let i = showFrom; i < path.length; i++) {
      const boxIdx = path[i];
      const foundVal = state.boxes[boxIdx];
      const isFound = foundVal === prisonerId;
      const isLast = i === path.length - 1;

      html += '<span class="arrow">→</span> ';

      if (isFound && isLast) {
        html += '<span class="step-marker">box#' + String(boxIdx).padStart(2, '0') + ' [' + foundVal + ']</span>';
        html += ' <span class="found-text">✓ FOUND</span>';
      } else if (isLast && state.roundState === 'LOSE') {
        html += '<span class="step-marker">box#' + String(boxIdx).padStart(2, '0') + ' [' + foundVal + ']</span>';
        html += ' <span class="fail-text">✗ FAIL</span>';
      } else if (isLast) {
        html += '<span class="step-marker">box#' + String(boxIdx).padStart(2, '0') + ' [' + foundVal + ']</span>';
      } else {
        html += '<span class="step-marker">box#' + String(boxIdx).padStart(2, '0') + '</span>';
      }
    }

    if (state.roundState === 'WIN') {
      html += ' — <span class="found-text">◈ ALL 100 SURVIVED ◈</span>';
    } else if (state.roundState === 'LOSE') {
      html += ' — <span class="fail-text">✖ EXECUTED</span>';
    }

    el.innerHTML = html;
  }

  function renderBottomBar() {
    document.getElementById('stat-wins').textContent = state.totalWins;
    document.getElementById('stat-losses').textContent = state.totalLosses;

    const total = state.totalWins + state.totalLosses;
    const rate = total === 0 ? 0 : (state.totalWins / total) * 100;
    document.getElementById('stat-rate').textContent = rate.toFixed(1) + '%';
    document.getElementById('stat-streak').textContent = state.maxStreak;

    const stateEl = document.getElementById('stat-state');
    stateEl.textContent = state.roundState;
    stateEl.className = 'stat-value';
    stateEl.classList.add('state-' + state.roundState.toLowerCase());

    // Meter
    const fill = document.getElementById('meter-fill');
    fill.style.width = rate + '%';
    fill.className = 'meter-fill';
    if (rate < 30) fill.classList.add('low');
    else if (rate <= 50) fill.classList.add('mid');
    else fill.classList.add('high');

    document.getElementById('meter-label').textContent = rate.toFixed(1) + '%';
    document.getElementById('round-badge').textContent = 'Round: ' + state.round;
  }

  function renderPathLines() {
    const svg = document.getElementById('path-lines');
    if (!svg) return;
    if (state.prisonerPath.length < 2 || state.roundState === 'IDLE') {
      svg.innerHTML = '';
      return;
    }

    const grid = document.getElementById('box-grid');
    const gridRect = grid.getBoundingClientRect();
    const svgRect = svg.getBoundingClientRect();
    const cellW = gridRect.width / 10;
    const cellH = gridRect.height / 10;

    const pid = state.currentPrisoner;
    const p = prisoners[pid];
    const pColor = p ? p.color : '#666';
    const isRunning = state.roundState === 'RUNNING';

    const showFrom = Math.max(0, state.prisonerPath.length - 9);
    const recentPath = state.prisonerPath.slice(showFrom);

    const relX = gridRect.left - svgRect.left;
    const relY = gridRect.top - svgRect.top;

    let lines = '';
    for (let i = 1; i < recentPath.length; i++) {
      const fromIdx = recentPath[i - 1];
      const toIdx = recentPath[i];
      const fromCol = fromIdx % 10;
      const fromRow = Math.floor(fromIdx / 10);
      const toCol = toIdx % 10;
      const toRow = Math.floor(toIdx / 10);

      const x1 = relX + fromCol * cellW + cellW / 2;
      const y1 = relY + fromRow * cellH + cellH / 2;
      const x2 = relX + toCol * cellW + cellW / 2;
      const y2 = relY + toRow * cellH + cellH / 2;

      // Dimmer for older steps, bright for latest
      const age = recentPath.length - 1 - i;
      const opacity = Math.max(0.2, 1 - age * 0.15);
      lines += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"
        stroke="${pColor}" stroke-width="2" stroke-opacity="${opacity * (isRunning ? 1 : 0.4)}"
        stroke-linecap="round" />`;
    }

    svg.innerHTML = lines;
  }

  function renderOverlay() {
    const overlay = document.getElementById('overlay');
    const text = document.getElementById('overlay-text');

    if (state.roundState === 'WIN') {
      overlay.classList.add('active');
      text.textContent = 'ALL SURVIVED';
      text.className = 'overlay-text win';
    } else if (state.roundState === 'LOSE') {
      overlay.classList.add('active');
      text.textContent = 'EXECUTED';
      text.className = 'overlay-text lose';
    } else {
      overlay.classList.remove('active');
    }
  }

  function renderAll() {
    renderBoxGrid();
    renderMugshot();
    renderPathStripe();
    renderPathLines();
    renderBottomBar();
    renderOverlay();
  }

  function renderStrategySelector() {
    const select = document.getElementById('strategy-select');
    select.innerHTML = '';
    for (const [key, s] of Object.entries(Strategies)) {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = s.name;
      if (key === state.strategy) opt.selected = true;
      select.appendChild(opt);
    }
  }

  function renderMixerPanel() {
    const panel = document.getElementById('mixer-panel');
    const strategy = Strategies[state.strategy];
    panel.innerHTML = '';

    for (const [key, mixer] of Object.entries(strategy.mixers)) {
      const group = document.createElement('div');
      group.className = 'mixer-group';

      const labelRow = document.createElement('div');
      labelRow.className = 'mixer-label';
      const label = document.createElement('span');
      label.textContent = key.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase());
      const val = document.createElement('span');
      val.className = 'mixer-value';
      val.id = 'mixer-val-' + key;
      const currentVal = state.config[key] !== undefined ? state.config[key] : mixer.default;
      val.textContent = mixer.step >= 1 ? currentVal : currentVal.toFixed(2);

      labelRow.appendChild(label);
      labelRow.appendChild(val);

      const input = document.createElement('input');
      input.type = 'range';
      input.min = mixer.min;
      input.max = mixer.max;
      input.step = mixer.step;
      input.value = currentVal;
      input.dataset.mixerKey = key;

      input.addEventListener('input', function(e) {
        const v = parseFloat(e.target.value);
        state.config[key] = v;
        document.getElementById('mixer-val-' + key).textContent = mixer.step >= 1 ? v : v.toFixed(2);
      });

      group.appendChild(labelRow);
      group.appendChild(input);
      panel.appendChild(group);
    }
  }
  </script>

  <!-- CONTROLLER — event listeners, simulation loop, init -->
  <script>
  /* ============================================================
     CONTROLLER — Event handlers, init
     ============================================================ */

  function onRun() {
    if (state.running) return;
    if (state.roundState === 'IDLE' || state.roundState === 'WIN' || state.roundState === 'LOSE') {
      state.round = 0;
      state.currentPrisoner = 0;
      state.prisonerStep = 0;
      state.prisonerPath = [];
      state.roundState = 'IDLE';
    }
    simulationAborted = false;
    runLoop();
    updateButtonStates();
  }

  function onPause() {
    state.running = false;
    simulationAborted = true;
    updateButtonStates();
  }

  function onReset() {
    state.running = false;
    simulationAborted = true;
    state.round = 0;
    state.currentPrisoner = 0;
    state.prisonerStep = 0;
    state.roundState = 'IDLE';
    state.prisonerPath = [];
    state.totalWins = 0;
    state.totalLosses = 0;
    state.maxStreak = 0;
    state.currentStreak = 0;
    state.history = [];
    generatePermutation();
    renderAll();
    updateButtonStates();
  }

  function onStrategyChange(value) {
    state.strategy = value;
    applyStrategyDefaults();
    renderMixerPanel();
    renderAll();
  }

  function onSpeedChange(value) {
    state.speed = parseInt(value, 10);
    document.getElementById('speed-value').textContent = value;
  }

  function updateButtonStates() {
    document.getElementById('btn-run').disabled = state.running;
    document.getElementById('btn-pause').disabled = !state.running;
  }

  function attachEventListeners() {
    document.getElementById('strategy-select').addEventListener('change', function(e) {
      onStrategyChange(e.target.value);
    });
    document.getElementById('btn-run').addEventListener('click', onRun);
    document.getElementById('btn-pause').addEventListener('click', onPause);
    document.getElementById('btn-reset').addEventListener('click', onReset);
    document.getElementById('speed-slider').addEventListener('input', function(e) {
      onSpeedChange(e.target.value);
    });
  }

  function init() {
    initPrisoners();
    generatePermutation();
    renderStrategySelector();
    applyStrategyDefaults();
    renderMixerPanel();
    renderAll();
    attachEventListeners();
    updateButtonStates();
    // Re-render path lines on resize
    window.addEventListener('resize', function() {
      if (state.prisonerPath.length > 0) renderPathLines();
    });
  }

  document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
